<!-- tools/google-apps-script/form.html -->
<!doctype html><html><head><base target="_top"><meta charset="utf-8">
<style>body{font:16px system-ui;max-width:560px;margin:32px auto;padding:0 16px}
label{display:block;margin:16px 0 4px;font-weight:600}
input,select,textarea{width:100%;padding:8px;font:inherit;box-sizing:border-box}
.hint{font-weight:400;color:#666;font-size:13px}.hp{display:none}
button{margin-top:20px;padding:10px 18px;font:inherit}</style></head>
<body>
<h1>Submit a tracker item</h1>
<form id="f">
  <label>Type<select name="type" required>
    <? for (var i = 0; i < types.length; i++) { ?><option value="<?= types[i] ?>"><?= types[i] ?></option><? } ?>
  </select></label>
  <label>Title<input name="title" required maxlength="200"></label>
  <label>Affected command / feature <span class="hint">(ribbon command name, or feature/function e.g. an updater)</span>
    <input name="commandFeature" maxlength="200"></label>
  <label>Description<textarea name="description" rows="6"></textarea></label>
  <input class="hp" name="company" tabindex="-1" autocomplete="off">
  <button type="submit">Submit</button>
  <p id="msg"></p>
</form>
<script>
var f=document.getElementById('f'),msg=document.getElementById('msg');
f.addEventListener('submit',function(e){e.preventDefault();msg.textContent='Submitting...';
google.script.run.withSuccessHandler(function(r){
  if(r && r.ok){f.reset();msg.textContent='Thanks! Your item was submitted.';}
  else{msg.textContent='Error: '+((r&&r.error)||'unknown');}
}).withFailureHandler(function(err){msg.textContent='Error: '+err.message;})
.doPost({parameter:{type:f.elements['type'].value,title:f.elements['title'].value,commandFeature:f.elements['commandFeature'].value,description:f.elements['description'].value,company:f.elements['company'].value}});
});
</script></body></html>
